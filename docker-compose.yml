# heliograph local stack.
#
#   Redpanda   — Kafka-API durable log (the system of record for durability)
#   ClickHouse — columnar OLAP sink (metrics + events)
#   ingest / processor / read-api — the Bun services (mounted from source)
#
# Phase 0 goal: `docker compose up -d redpanda clickhouse` -> both healthy;
# the three services boot and answer /healthz.

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --check=false
    ports:
      - "19092:19092" # external Kafka listener (host -> broker)
      - "9644:9644"   # admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: heliograph
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  ingest:
    image: oven/bun:1.3.0
    working_dir: /app
    command: ["bun", "run", "apps/ingest/src/main.ts"]
    environment:
      INGEST_HTTP_PORT: 4318
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://clickhouse:8123
      IDENTITY_PEPPER: dev-only-change-me
    ports:
      - "4318:4318"
    volumes:
      - ./:/app
    depends_on:
      redpanda:
        condition: service_healthy

  processor:
    image: oven/bun:1.3.0
    working_dir: /app
    command: ["bun", "run", "apps/processor/src/main.ts"]
    environment:
      OPS_PORT: 9465
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://clickhouse:8123
    ports:
      - "9465:9465"
    volumes:
      - ./:/app
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  read-api:
    image: oven/bun:1.3.0
    working_dir: /app
    command: ["bun", "run", "apps/read-api/src/main.ts"]
    environment:
      READ_API_PORT: 8080
      CLICKHOUSE_URL: http://clickhouse:8123
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  redpanda-data:
  clickhouse-data:
